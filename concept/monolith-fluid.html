<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#070809" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Monolith — Anomaly Core</title>
<style>
:root{--bg:#070809;--primary:#F4F4F2;--secondary:#9AA1AC;--accent:#F5F0E8;
  --font:-apple-system,"SF Pro Display","Inter","Helvetica Neue",system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--primary);font-family:var(--font);
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;touch-action:none;overscroll-behavior:none;}
.top{position:fixed;z-index:4;top:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:max(18px,env(safe-area-inset-top)) 24px 0;font-size:12px;letter-spacing:.2em;color:var(--secondary);}
.title{position:fixed;left:24px;top:max(74px,calc(env(safe-area-inset-top) + 56px));z-index:4;}
.title .k{font-size:12px;letter-spacing:.18em;color:var(--secondary);text-transform:uppercase;}
.title .h{font-weight:300;font-size:clamp(34px,9vw,48px);letter-spacing:-.02em;line-height:1;margin-top:6px;
  text-shadow:0 1px 30px rgba(0,0,0,.7);}
#fluid{position:fixed;inset:0;z-index:1;width:100%;height:100%;display:block;}
.statelabel{position:fixed;left:0;right:0;bottom:176px;z-index:4;text-align:center;
  font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--secondary);transition:color .3s;}
.statelabel.sealed{color:var(--accent);}
.panel{position:fixed;left:0;right:0;bottom:0;z-index:4;
  padding:0 28px max(26px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px;}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:2px;border-radius:2px;background:rgba(154,161,172,.3);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 1px rgba(0,0,0,.3);}
.scaleline{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(154,161,172,.5);}
.hint{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(154,161,172,.6);text-align:center;}
.seal-flash{position:fixed;inset:0;background:#eafff6;z-index:9;opacity:0;pointer-events:none;transition:opacity .12s;mix-blend-mode:screen;}
</style>
</head>
<body>
<div class="seal-flash" id="flash"></div>
<canvas id="fluid"></canvas>
<div class="top"><span>11:30</span><span>SHIP · v2</span></div>
<div class="title"><div class="k">Implementation</div><div class="h">Sleep<br>Consistency</div></div>
<div class="statelabel" id="state">DEPLOYING</div>
<div class="panel">
  <input class="slider" id="slider" type="range" min="0" max="1000" value="0">
  <div class="scaleline"><span>Deploying</span><span>Stabilizing</span><span>Open</span><span>Sealed</span></div>
  <div class="hint">drag to scrub formation · hold the core to ship</div>
</div>

<script>
const TAU=Math.PI*2, rnd=(a,b)=>a+Math.random()*(b-a),
      lerp=(a,b,k)=>a+(b-a)*k, clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),
      easeIO=x=>x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;

const disp=document.getElementById('fluid'), D=disp.getContext('2d');
const flash=document.getElementById('flash'), stateEl=document.getElementById('state'),
      slider=document.getElementById('slider');

let CW,CH,cx,cy,R,dpr,cells=[],tendrils=[];
// iridescent rim hues
const HUES=[[255,95,120],[95,230,235],[120,255,150],[225,225,255],[200,150,255],[255,170,90]];

function rot(x,y,z,ax,ay){
  const cz=Math.cos(ay),sz=Math.sin(ay), x1=x*cz+z*sz, z1=-x*sz+z*cz;
  const cxx=Math.cos(ax),sxx=Math.sin(ax), y1=y*cxx-z1*sxx, z2=y*sxx+z1*cxx;
  return [x1,y1,z2];
}
function setup(){
  dpr=Math.min(2,window.devicePixelRatio||1);
  CW=window.innerWidth; CH=window.innerHeight;
  disp.width=CW*dpr; disp.height=CH*dpr; D.setTransform(dpr,0,0,dpr,0,0);
  cx=CW*0.5; cy=CH*0.43; R=Math.min(CW,CH)*0.19;

  // cells distributed on a sphere (Fibonacci), each a glowing hole in the shell
  cells=[]; const N=104, GA=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<N;i++){
    const y=1-(i/(N-1))*2, rr=Math.sqrt(Math.max(0,1-y*y)), th=i*GA;
    const u=[Math.cos(th)*rr, y, Math.sin(th)*rr];
    const a=rnd(0,TAU), rad=rnd(CW*0.25,CW*0.8);
    cells.push({u, size:rnd(0.05,0.15), hue:HUES[(Math.random()*HUES.length)|0],
      strands:Math.random()<0.5, spike:Math.random()<0.55?rnd(0.14,0.42):0,
      cx0:cx+Math.cos(a)*rad, cy0:cy+Math.sin(a)*rad, ph:rnd(0,TAU), sp:rnd(.6,1.3)});
  }
  // dendritic tendrils crawling off the shell (the "anomaly spread")
  tendrils=[];
  const add=(p,q)=>[p[0]+q[0],p[1]+q[1],p[2]+q[2]];
  const sc=(p,s)=>[p[0]*s,p[1]*s,p[2]*s];
  const jit=(d,s)=>{const j=[d[0]+rnd(-s,s),d[1]+rnd(-s,s),d[2]+rnd(-s,s)];
    const l=Math.hypot(...j)||1;return [j[0]/l,j[1]/l,j[2]/l];};
  function branch(start,dir,len,depth){
    if(depth<=0||len<0.05) return;
    const d2=jit(dir,0.28), end=add(start,sc(d2,len));
    tendrils.push([start,end,depth]);
    const n=depth>1?2:1;
    for(let k=0;k<n;k++) branch(end,d2,len*0.62,depth-1);
  }
  for(let r=0;r<6;r++){
    const a=rnd(0,TAU), ph=Math.acos(rnd(-0.4,0.9));
    const u=[Math.sin(ph)*Math.cos(a),Math.cos(ph),Math.sin(ph)*Math.sin(a)];
    branch(u, u, 0.55, 4);
  }
}
addEventListener('resize',setup);

function drawEnergy(t,time){
  const e=easeIO(t), b=0.5+0.5*Math.sin(time*0.00075);
  const ax=time*0.00020, ay=time*0.00032;
  D.clearRect(0,0,CW,CH);
  D.fillStyle='#070809'; D.fillRect(0,0,CW,CH);

  // luminous bloom behind the core (echoes the bright haze in the reference)
  const bi=(0.12+0.7*t)*(0.82+0.18*b);
  const bg=D.createRadialGradient(cx,cy,0,cx,cy,R*2.6);
  bg.addColorStop(0,`rgba(228,248,240,${0.30*bi})`);
  bg.addColorStop(.4,`rgba(150,200,210,${0.12*bi})`);
  bg.addColorStop(1,'rgba(0,0,0,0)');
  D.fillStyle=bg; D.beginPath(); D.arc(cx,cy,R*2.6,0,TAU); D.fill();

  // dendritic tendrils (behind shell), grow with t
  if(t>0.45){
    const ta=clamp((t-0.45)/0.55,0,1);
    D.lineWidth=1;
    for(const [s,en,depth] of tendrils){
      const ps=rot(s[0],s[1],s[2],ax,ay), pe=rot(en[0],en[1],en[2],ax,ay);
      const x1=cx+ps[0]*R, y1=cy+ps[1]*R, x2=cx+pe[0]*R, y2=cy+pe[1]*R;
      const dep=(((ps[2]+pe[2])/2)+1)/2;
      D.strokeStyle=`rgba(200,235,235,${ta*(0.12+0.18*dep)/depth})`;
      D.beginPath(); D.moveTo(x1,y1); D.lineTo(x2,y2); D.stroke();
    }
  }

  // dark shell base (shaded, lit from upper-left)
  const shellA=clamp((t-0.15)/0.6,0,1);
  if(shellA>0.02){
    const sg=D.createRadialGradient(cx-R*0.35,cy-R*0.4,R*0.1,cx,cy,R*1.05);
    sg.addColorStop(0,`rgba(58,44,66,${shellA})`);
    sg.addColorStop(.6,`rgba(28,22,34,${shellA})`);
    sg.addColorStop(1,`rgba(10,9,14,${shellA})`);
    D.fillStyle=sg; D.beginPath(); D.arc(cx,cy,R*1.02,0,TAU); D.fill();
  }

  // spikes (sea-urchin) on the silhouette — drawn before cells
  D.globalCompositeOperation='source-over';
  for(const c of cells){
    if(!c.spike) continue;
    const u=rot(c.u[0],c.u[1],c.u[2],ax,ay);
    if(u[2]>0.4) continue;                      // only rim/side spikes show
    const bx=cx+u[0]*R, by=cy+u[1]*R, L=c.spike*R*e;
    const tx=cx+u[0]*(R+L), ty=cy+u[1]*(R+L);
    D.strokeStyle=`rgba(40,46,58,${shellA*0.9})`; D.lineWidth=2.2;
    D.beginPath(); D.moveTo(bx,by); D.lineTo(tx,ty); D.stroke();
    D.fillStyle=`rgba(210,235,240,${shellA*0.5})`; D.beginPath(); D.arc(tx,ty,1.1,0,TAU); D.fill();
  }

  // glowing cells (holes), additive, depth-sorted front
  D.globalCompositeOperation='lighter';
  const proj=cells.map(c=>{const u=rot(c.u[0],c.u[1],c.u[2],ax,ay);return {c,u};})
                  .sort((a,bb)=>a.u[2]-bb.u[2]);
  for(const {c,u} of proj){
    if(u[2]<-0.15) continue;                    // hidden on the far side
    const sx=lerp(c.cx0, cx+u[0]*R, e), sy=lerp(c.cy0, cy+u[1]*R, e);
    const ang=Math.atan2(sy-cy, sx-cx);
    const minor=clamp(Math.abs(u[2]),0.16,1);   // foreshorten toward silhouette
    const cellR=c.size*R*(0.9+0.2*b);
    const bright=(0.30+0.7*clamp(u[2],0,1))*(0.45+0.55*t);
    D.save(); D.translate(sx,sy); D.rotate(ang); D.scale(minor,1);
    const g=D.createRadialGradient(0,0,0,0,0,cellR);
    g.addColorStop(0,`rgba(255,255,255,${bright})`);
    g.addColorStop(.62,`rgba(225,240,255,${bright*0.45})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    D.fillStyle=g; D.beginPath(); D.arc(0,0,cellR,0,TAU); D.fill();
    // iridescent chromatic rim
    D.lineWidth=1.3;
    D.strokeStyle=`rgba(255,90,120,${bright*0.5})`; D.beginPath(); D.arc(1.4,0,cellR*0.94,0,TAU); D.stroke();
    D.strokeStyle=`rgba(90,225,235,${bright*0.5})`; D.beginPath(); D.arc(-1.4,0,cellR*0.94,0,TAU); D.stroke();
    D.strokeStyle=`rgba(${c.hue[0]},${c.hue[1]},${c.hue[2]},${bright*0.6})`;
    D.beginPath(); D.arc(0,0,cellR*0.94,0,TAU); D.stroke();
    // web strands inside the larger front cells
    if(c.strands && u[2]>0.45){
      D.strokeStyle=`rgba(255,255,255,${bright*0.35})`; D.lineWidth=0.8;
      for(let k=-1;k<=1;k++){D.beginPath();
        D.moveTo(-cellR*0.8,k*cellR*0.3);
        D.quadraticCurveTo(0,-k*cellR*0.5, cellR*0.8,k*cellR*0.3); D.stroke();}
    }
    D.restore();
  }
  D.globalCompositeOperation='source-over';
}

/* radial hold-dial */
function drawDial(k){
  if(k<=0) return;
  const axx=cx, ayy=cy+R+CH*0.15, Rd=44, A0=Math.PI*0.75, A1=Math.PI*2.25;
  for(let i=0;i<=28;i++){const a=lerp(A0,A1,i/28), on=i/28<=k,
    r1=Rd+(i%7===0?9:5), x1=axx+Math.cos(a)*Rd, y1=ayy+Math.sin(a)*Rd,
    x2=axx+Math.cos(a)*r1, y2=ayy+Math.sin(a)*r1;
    D.strokeStyle=on?'rgba(210,250,240,.9)':'rgba(154,161,172,.28)'; D.lineWidth=1.4;
    D.beginPath();D.moveTo(x1,y1);D.lineTo(x2,y2);D.stroke();}
  const ka=lerp(A0,A1,k), kx=axx+Math.cos(ka)*Rd, ky=ayy+Math.sin(ka)*Rd;
  D.fillStyle='#fff';D.beginPath();D.arc(kx,ky,7,0,TAU);D.fill();
}

let t=0, baseT=0, holding=false, holdStart=0, sealed=false, holdK=0;
const HOLD=1600;
const stateName=v=>v>=.999?'SEALED · v1.5.0':v>=.7?'GATE OPEN':v>=.34?'STABILIZING':'DEPLOYING';
const vibe=p=>{try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}};
let actx=null;
function sealSound(){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const tt=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type='triangle';
  o.frequency.setValueAtTime(420,tt);o.frequency.exponentialRampToValueAtTime(70,tt+.3);
  g.gain.setValueAtTime(.0001,tt);g.gain.exponentialRampToValueAtTime(.4,tt+.01);
  g.gain.exponentialRampToValueAtTime(.0001,tt+.6);o.connect(g).connect(actx.destination);
  o.start(tt);o.stop(tt+.65);}catch(e){}}

slider.addEventListener('input',()=>{ if(holding) return; baseT=slider.value/1000; t=baseT; });
disp.addEventListener('pointerdown',e=>{e.preventDefault(); if(sealed) return;
  holding=true; baseT=slider.value/1000; holdStart=performance.now(); vibe(8);});
const release=()=>{ holding=false; };
addEventListener('pointerup',release); addEventListener('pointercancel',release);

let lastVibe=0;
function loop(now){
  if(holding){
    const k=clamp((now-holdStart)/HOLD,0,1); holdK=k;
    t=baseT+(1-baseT)*k;
    if(now-lastVibe>110){vibe(4);lastVibe=now;}
    if(k>=1&&!sealed){ sealed=true; holding=false; slider.value=1000;
      vibe([0,70]); sealSound();
      flash.style.opacity=.8; setTimeout(()=>flash.style.opacity=0,150);
      setTimeout(()=>{sealed=false;holdK=0;},2000); }
  }else if(!sealed){ t+=(baseT-t)*0.16; holdK+=(0-holdK)*0.1; }
  drawEnergy(t,now);
  drawDial(sealed?1:holdK);
  stateEl.textContent=stateName(t);
  stateEl.classList.toggle('sealed',t>=.999);
  requestAnimationFrame(loop);
}
setup(); requestAnimationFrame(loop);
</script>
</body>
</html>
