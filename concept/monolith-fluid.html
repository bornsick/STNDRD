<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0B0D11" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Monolith — Backlit Figure</title>
<style>
:root{--bg:#0B0D11;--primary:#F4F4F2;--secondary:#9AA1AC;--accent:#F5F0E8;
  --font:-apple-system,"SF Pro Display","Inter","Helvetica Neue",system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--primary);font-family:var(--font);
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;touch-action:none;overscroll-behavior:none;}
.top{position:fixed;z-index:4;top:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:max(18px,env(safe-area-inset-top)) 24px 0;font-size:12px;letter-spacing:.2em;color:var(--secondary);}
.title{position:fixed;left:24px;top:max(74px,calc(env(safe-area-inset-top) + 56px));z-index:4;}
.title .k{font-size:12px;letter-spacing:.18em;color:var(--secondary);text-transform:uppercase;}
.title .h{font-weight:300;font-size:clamp(34px,9vw,48px);letter-spacing:-.02em;line-height:1;margin-top:6px;
  text-shadow:0 1px 30px rgba(0,0,0,.6);}
#fluid{position:fixed;inset:0;z-index:1;width:100%;height:100%;display:block;}
.statelabel{position:fixed;left:0;right:0;bottom:176px;z-index:4;text-align:center;
  font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--secondary);transition:color .3s;}
.statelabel.sealed{color:var(--accent);}
.panel{position:fixed;left:0;right:0;bottom:0;z-index:4;
  padding:0 28px max(26px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px;}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:2px;border-radius:2px;background:rgba(154,161,172,.3);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 1px rgba(0,0,0,.3);}
.scaleline{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(154,161,172,.5);}
.hint{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(154,161,172,.6);text-align:center;}
.seal-flash{position:fixed;inset:0;background:var(--accent);z-index:9;opacity:0;pointer-events:none;transition:opacity .12s;mix-blend-mode:overlay;}
</style>
</head>
<body>
<div class="seal-flash" id="flash"></div>
<canvas id="fluid"></canvas>
<div class="top"><span>11:30</span><span>SHIP · v2</span></div>
<div class="title"><div class="k">Implementation</div><div class="h">Sleep<br>Consistency</div></div>
<div class="statelabel" id="state">DEPLOYING</div>
<div class="panel">
  <input class="slider" id="slider" type="range" min="0" max="1000" value="0">
  <div class="scaleline"><span>Deploying</span><span>Stabilizing</span><span>Open</span><span>Sealed</span></div>
  <div class="hint">drag to scrub formation · hold the figure to ship</div>
</div>

<script>
const TAU=Math.PI*2, rnd=(a,b)=>a+Math.random()*(b-a),
      lerp=(a,b,k)=>a+(b-a)*k, clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const disp=document.getElementById('fluid'), D=disp.getContext('2d');
const flash=document.getElementById('flash'), stateEl=document.getElementById('state'),
      slider=document.getElementById('slider');

let CW,CH,cx,cy,dpr,buf,B,fg,FG,bW,bH,blobs=[],S=0.5;

function ptInCapsule(ax,ay,bx,by,r){
  const tt=Math.random(), x=lerp(ax,bx,tt), y=lerp(ay,by,tt),
        a=rnd(0,TAU), rr=Math.sqrt(Math.random())*r;
  return {x:x+Math.cos(a)*rr, y:y+Math.sin(a)*rr};
}
function setup(){
  dpr=Math.min(2,window.devicePixelRatio||1);
  CW=window.innerWidth; CH=window.innerHeight;
  disp.width=CW*dpr; disp.height=CH*dpr; D.setTransform(dpr,0,0,dpr,0,0);
  bW=Math.round(CW*S); bH=Math.round(CH*S);
  buf=document.createElement('canvas'); buf.width=bW; buf.height=bH; B=buf.getContext('2d');
  fg=document.createElement('canvas'); fg.width=bW; fg.height=bH; FG=fg.getContext('2d');

  // ── parametric human figure (display coords) ──
  const FH=CH*0.58; cx=CW*0.5; cy=CH*0.45;
  const headY=cy-FH*0.5, feetY=cy+FH*0.5, rHead=FH*0.082,
        shY=headY+rHead*1.7, hipY=shY+FH*0.30, shH=FH*0.165;
  const parts=[ // ax,ay,bx,by,radius,count
    [cx,headY, cx,headY, rHead,           9],
    [cx-shH,shY, cx+shH,shY, FH*0.05,    12],   // shoulders
    [cx,shY+FH*0.01, cx,hipY, FH*0.125,  30],   // torso
    [cx-shH*0.92,shY, cx-shH*1.02,hipY+FH*0.04, FH*0.038, 11],  // left arm
    [cx+shH*0.92,shY, cx+shH*1.02,hipY+FH*0.04, FH*0.038, 11],  // right arm
    [cx-FH*0.05,hipY, cx-FH*0.058,feetY, FH*0.05, 14],          // left leg
    [cx+FH*0.05,hipY, cx+FH*0.058,feetY, FH*0.05, 14],          // right leg
  ];
  blobs=[];
  for(const [ax,ay,bx,by,r,n] of parts){
    for(let i=0;i<n;i++){
      const tg=ptInCapsule(ax,ay,bx,by,r);
      const a=rnd(0,TAU), rad=rnd(CW*0.2,CW*0.7);
      blobs.push({tx:tg.x*S, ty:tg.y*S,
        x:(cx+Math.cos(a)*rad)*S, y:(cy+Math.sin(a)*rad)*S,
        vx:0,vy:0, r:rnd(0.62,0.95)*r*S, ph:rnd(0,TAU), sp:rnd(.6,1.2)});
    }
  }
}
addEventListener('resize',setup);

function drawFluid(t,time){
  const turb=lerp(0.8,0.02,t), attr=lerp(0.001,0.085,t), damp=0.85;

  // 1) figure mask (white) into low-res buffer
  B.clearRect(0,0,bW,bH);
  B.globalCompositeOperation='source-over';
  B.filter=`blur(${lerp(3.4,1.8,t)}px)`;
  for(const p of blobs){
    const nx=Math.sin(p.y*0.05+time*0.0005*p.sp)+Math.cos(p.x*0.04-time*0.0004);
    const ny=Math.cos(p.x*0.05-time*0.0005*p.sp)+Math.sin(p.y*0.04+time*0.0004);
    let fx=nx*turb, fy=ny*turb-0.02*turb;
    fx+=(p.tx-p.x)*attr; fy+=(p.ty-p.y)*attr;
    p.vx=(p.vx+fx)*damp; p.vy=(p.vy+fy)*damp; p.x+=p.vx; p.y+=p.vy;
    const rr=p.r*(1+0.06*Math.sin(time*0.001*p.sp+p.ph));
    const g=B.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);
    g.addColorStop(0,'rgba(255,255,255,0.95)');
    g.addColorStop(.7,'rgba(255,255,255,0.55)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    B.fillStyle=g; B.beginPath(); B.arc(p.x,p.y,rr,0,TAU); B.fill();
  }
  B.filter='none';
  // 2) dark figure = mask stencilled with near-black
  FG.clearRect(0,0,bW,bH); FG.globalCompositeOperation='source-over';
  FG.drawImage(buf,0,0);
  FG.globalCompositeOperation='source-in';
  FG.fillStyle='#05060a'; FG.fillRect(0,0,bW,bH);
  FG.globalCompositeOperation='source-over';

  // 3) compose display: bg -> light pool -> bright halo -> dark figure -> vignette
  D.clearRect(0,0,CW,CH);
  D.fillStyle='#0B0D11'; D.fillRect(0,0,CW,CH);

  // light pool (the backlight) — brightens as the figure coheres
  const pool=D.createRadialGradient(cx,cy-CH*0.04,8,cx,cy,CH*0.46);
  const lp=lerp(0.30,0.85,t);
  pool.addColorStop(0,`rgba(214,224,238,${lp})`);
  pool.addColorStop(.4,`rgba(150,168,198,${lp*0.5})`);
  pool.addColorStop(1,'transparent');
  D.fillStyle=pool; D.fillRect(0,0,CW,CH);

  // halo / rim — the figure mask, white, heavily blurred, added behind
  D.save();
  D.globalCompositeOperation='lighter';
  D.filter=`blur(${lerp(26,13,t)}px)`;
  D.globalAlpha=lerp(0.10,0.6,t);
  D.drawImage(buf,0,0,CW,CH);
  D.restore();

  // dark soft-edged figure over the light -> backlit silhouette
  D.save();
  D.filter=`blur(${lerp(9,4,t)}px)`;
  D.globalAlpha=lerp(0.45,0.98,t);
  D.drawImage(fg,0,0,CW,CH);
  D.restore();

  // vignette to focus the light pool and darken the surroundings
  const vg=D.createRadialGradient(cx,cy,CH*0.16,cx,cy,CH*0.72);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(7,8,12,0.92)');
  D.fillStyle=vg; D.fillRect(0,0,CW,CH);
}

/* radial hold-dial echoing the reference control */
function drawDial(k){
  if(k<=0) return;
  const ax=cx, ay=CH*0.45+CH*0.31, R=44, A0=Math.PI*0.75, A1=Math.PI*2.25;
  for(let i=0;i<=28;i++){const a=lerp(A0,A1,i/28), on=i/28<=k,
    r1=R+(i%7===0?9:5), x1=ax+Math.cos(a)*R, y1=ay+Math.sin(a)*R,
    x2=ax+Math.cos(a)*r1, y2=ay+Math.sin(a)*r1;
    D.strokeStyle=on?'rgba(245,240,232,.85)':'rgba(154,161,172,.28)'; D.lineWidth=1.4;
    D.beginPath();D.moveTo(x1,y1);D.lineTo(x2,y2);D.stroke();}
  const ka=lerp(A0,A1,k), kx=ax+Math.cos(ka)*R, ky=ay+Math.sin(ka)*R;
  D.fillStyle='#fff';D.beginPath();D.arc(kx,ky,7,0,TAU);D.fill();
}

let t=0, baseT=0, holding=false, holdStart=0, sealed=false, holdK=0;
const HOLD=1600;
const stateName=v=>v>=.999?'SEALED · v1.5.0':v>=.7?'GATE OPEN':v>=.34?'STABILIZING':'DEPLOYING';
const vibe=p=>{try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}};
let actx=null;
function sealSound(){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const tt=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type='sine';
  o.frequency.setValueAtTime(150,tt);o.frequency.exponentialRampToValueAtTime(40,tt+.24);
  g.gain.setValueAtTime(.0001,tt);g.gain.exponentialRampToValueAtTime(.45,tt+.012);
  g.gain.exponentialRampToValueAtTime(.0001,tt+.55);o.connect(g).connect(actx.destination);
  o.start(tt);o.stop(tt+.6);}catch(e){}}

slider.addEventListener('input',()=>{ if(holding) return; baseT=slider.value/1000; t=baseT; });
disp.addEventListener('pointerdown',e=>{e.preventDefault(); if(sealed) return;
  holding=true; baseT=slider.value/1000; holdStart=performance.now(); vibe(8);});
const release=()=>{ holding=false; };
addEventListener('pointerup',release); addEventListener('pointercancel',release);

let lastVibe=0;
function loop(now){
  if(holding){
    const k=clamp((now-holdStart)/HOLD,0,1); holdK=k;
    t=baseT+(1-baseT)*k;
    if(now-lastVibe>110){vibe(4);lastVibe=now;}
    if(k>=1&&!sealed){ sealed=true; holding=false; slider.value=1000;
      vibe([0,70]); sealSound();
      flash.style.opacity=.85; setTimeout(()=>flash.style.opacity=0,150);
      setTimeout(()=>{sealed=false;holdK=0;},2000); }
  }else if(!sealed){ t+=(baseT-t)*0.16; holdK+=(0-holdK)*0.1; }
  drawFluid(t,now);
  drawDial(sealed?1:holdK);
  stateEl.textContent=stateName(t);
  stateEl.classList.toggle('sealed',t>=.999);
  requestAnimationFrame(loop);
}
setup(); requestAnimationFrame(loop);
</script>
</body>
</html>
