<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="SHIP" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>SHIP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <noscript>SHIP requires JavaScript.</noscript>

  <header class="masthead">
    <div class="masthead__id">
      <span class="masthead__mark">▮</span>
      <span class="masthead__name">SHIP</span>
    </div>
    <div class="masthead__version" id="version-display" title="Current version of the self">v0.0.0</div>
  </header>

  <main id="app">
    <!-- Rendered by app.js -->
  </main>

  <footer class="footer">
    <span class="footer__rule">ONE IMPLEMENTATION AT A TIME · EVIDENCE OPENS THE GATE · A PERSON WALKS THROUGH IT</span>
  </footer>

  <!-- ───────────────── Modal: Deploy ───────────────── -->
  <div class="modal" id="deploy-modal" hidden>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="deploy-title">
      <h2 class="modal__title" id="deploy-title">DEPLOY IMPLEMENTATION</h2>
      <p class="modal__note">One thing, integrated before the next. No queue. No backlog.</p>
      <form id="deploy-form">
        <label class="field">
          <span class="field__label">FOCUS</span>
          <span class="field__hint">The single thing being integrated.</span>
          <input class="field__input" name="focus" type="text" maxlength="120" required
                 placeholder="e.g. Sleep consistency" autocomplete="off" />
        </label>

        <label class="field">
          <span class="field__label">BOTTLENECK</span>
          <span class="field__hint">The one current blocker. Editing this is the work.</span>
          <input class="field__input" name="bottleneck" type="text" maxlength="160" required
                 placeholder="e.g. No fixed wind-down time" autocomplete="off" />
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field__label">WINDOW</span>
            <span class="field__hint">Days until the window closes and forces resolution.</span>
            <input class="field__input" name="window_days" type="number" min="1" max="365" value="14" required />
          </label>
          <label class="field">
            <span class="field__label">STABILIZATION</span>
            <span class="field__hint">Mandatory dwell days before the gate can open.</span>
            <input class="field__input" name="required_days" type="number" min="1" max="365" value="7" required />
          </label>
        </div>

        <label class="field">
          <span class="field__label">LINKED SIGNAL <span class="field__optional">— optional</span></span>
          <span class="field__hint">A behavior metric_id used as evidence. The only thing read across the wall.</span>
          <input class="field__input" name="linked_signal" type="text" maxlength="80"
                 placeholder="e.g. sleep_consistency" autocomplete="off" />
        </label>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" data-close-modal>CANCEL</button>
          <button type="submit" class="btn btn--solid">DEPLOY</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ───────────────── Modal: Generic prompt ───────────────── -->
  <div class="modal" id="prompt-modal" hidden>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="prompt-title">
      <h2 class="modal__title" id="prompt-title">—</h2>
      <p class="modal__note" id="prompt-note"></p>
      <form id="prompt-form">
        <label class="field">
          <span class="field__label" id="prompt-label">REASON</span>
          <input class="field__input" id="prompt-input" type="text" maxlength="200" autocomplete="off" />
        </label>
        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" data-close-modal>CANCEL</button>
          <button type="submit" class="btn btn--solid" id="prompt-confirm">CONFIRM</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
